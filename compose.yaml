version: "3.9"
services:
  shop:
    build:
      context: .
      dockerfile: packages/shop/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./packages/shop:/app/packages/shop
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://api:8080

  admin:
    build:
      context: .
      dockerfile: packages/admin/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./packages/admin:/app/packages/admin
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://api:8080

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./api:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
